services:
  postgres:
    image: postgres:17
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: directport
      POSTGRES_PASSWORD: directport
      POSTGRES_DB: directport
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
