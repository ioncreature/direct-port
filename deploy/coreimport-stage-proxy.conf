server {
    listen 80;
    server_name coreimport.ru;

    location / {
        proxy_pass https://coreimport-landing.lab42-stg.work;
        proxy_set_header Host coreimport-landing.lab42-stg.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admin-access.coreimport.ru;

    location / {
        proxy_pass https://coreimport-admin.lab42-stg.work;
        proxy_set_header Host coreimport-admin.lab42-stg.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
