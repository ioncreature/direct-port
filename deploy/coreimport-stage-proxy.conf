server {
    listen 80;
    server_name coreimport-landing.lab42-stg.work;
    client_max_body_size 15m;

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Connection "";
        proxy_set_header Host coreimport-landing.lab42-stg.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name coreimport-landing.lab42-stg.work;
    client_max_body_size 15m;

    ssl_certificate /etc/letsencrypt/live/lab42-stg.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab42-stg.work/privkey.pem;

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Connection "";
        proxy_set_header Host coreimport-landing.lab42-stg.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

