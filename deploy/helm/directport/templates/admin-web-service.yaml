apiVersion: v1
kind: Service
metadata:
  name: {{ include "directport.fullname" . }}-admin-web
  labels:
    {{- include "directport.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.adminWeb.port }}
      targetPort: {{ .Values.adminWeb.port }}
      protocol: TCP
  selector:
    {{- include "directport.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin-web
