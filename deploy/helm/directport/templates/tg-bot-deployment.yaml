apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "directport.fullname" . }}-tg-bot
  labels:
    {{- include "directport.labels" . | nindent 4 }}
    app.kubernetes.io/component: tg-bot
spec:
  replicas: {{ .Values.tgBot.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "directport.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tg-bot
  template:
    metadata:
      labels:
        {{- include "directport.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tg-bot
    spec:
      {{- $redisHost := ternary (printf "%s-redis-master" .Release.Name) .Values.redis.host .Values.redis.enabled }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ $redisHost }} {{ .Values.redis.port }}; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: tg-bot
          image: "{{ .Values.tgBot.image.repository }}:{{ .Values.tgBot.image.tag }}"
          imagePullPolicy: {{ .Values.tgBot.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.tgBot.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "directport.fullname" . }}-secrets
          env:
            - name: BOT_PORT
              value: {{ .Values.tgBot.port | quote }}
            - name: API_BASE_URL
              value: {{ include "directport.apiUrl" . | quote }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.tgBot.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.tgBot.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.tgBot.resources | nindent 12 }}
