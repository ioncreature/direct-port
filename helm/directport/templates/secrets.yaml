apiVersion: v1
kind: Secret
metadata:
  name: {{ include "directport.fullname" . }}-secrets
  labels:
    {{- include "directport.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "directport.databaseUrl" . | quote }}
  REDIS_URL: {{ include "directport.redisUrl" . | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  API_INTERNAL_KEY: {{ .Values.secrets.apiInternalKey | quote }}
  TKS_API_KEY: {{ .Values.secrets.tksApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
