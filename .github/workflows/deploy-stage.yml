name: Deploy to Stage

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: admin-web
            dockerfile: apps/admin-web/Dockerfile
          - name: tg-bot
            dockerfile: apps/tg-bot/Dockerfile
          - name: landing
            dockerfile: apps/landing/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app.name }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=stage

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - uses: azure/setup-helm@v4

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build ./deploy/helm/directport

      - uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGE }}

      - name: Create/Update GHCR pull secret
        run: |
          kubectl -n directport-stage create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username='${{ secrets.GHCR_USERNAME }}' \
            --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
            --docker-email='devnull@example.com' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          DB_PASSWORD="${{ secrets.STAGE_POSTGRES_PASSWORD }}"
          EXISTING_DB_PASSWORD="$(kubectl -n directport-stage get secret directport-stage-postgresql -o jsonpath='{.data.password}' 2>/dev/null | base64 --decode || true)"
          if [ -n "$EXISTING_DB_PASSWORD" ]; then
            DB_PASSWORD="$EXISTING_DB_PASSWORD"
          fi
          if [ -z "$DB_PASSWORD" ]; then
            echo "WARN: PostgreSQL password is empty and existing secret was not found. Generating a password for first install."
            DB_PASSWORD="$(openssl rand -hex 24)"
          fi

          cat <<EOF > /tmp/helm-secrets.yaml
          secrets:
            jwtSecret: "${{ secrets.JWT_SECRET }}"
            apiInternalKey: "${{ secrets.API_INTERNAL_KEY }}"
            tksApiBaseUrl: "${{ secrets.TKS_API_BASE_URL }}"
            tksTnvedApiKey: "${{ secrets.TKS_TNVED_API_KEY }}"
            tksGoodsApiKey: "${{ secrets.TKS_GOODS_API_KEY }}"
            anthropicApiKey: "${{ secrets.ANTHROPIC_API_KEY }}"
            telegramBotToken: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          EOF

          helm upgrade --install directport-stage ./deploy/helm/directport \
            -f ./deploy/helm/directport/values-stage.yaml \
            -f /tmp/helm-secrets.yaml \
            --namespace directport-stage \
            --create-namespace \
            --set api.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api \
            --set api.image.tag=${{ github.sha }} \
            --set adminWeb.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-admin-web \
            --set adminWeb.image.tag=${{ github.sha }} \
            --set tgBot.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-tg-bot \
            --set tgBot.image.tag=${{ github.sha }} \
            --set landing.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-landing \
            --set landing.image.tag=${{ github.sha }} \
            --set postgresql.auth.password="$DB_PASSWORD" \
            --set global.postgresql.auth.password="$DB_PASSWORD" \
            --wait --timeout 7m

          rm -f /tmp/helm-secrets.yaml
